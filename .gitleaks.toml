# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks

[allowlist]
  description = "Global allowlist"
  paths = [
    '''vendor/''',
    '''node_modules/''',
    '''dist/''',
    '''src-tauri/target/''',
    '''composer\.lock''',
    '''package-lock\.json''',
    '''\.env$''',
    '''\.env\.example''',
    '''\.env\.testing''',
    '''\.env\.tauri''',
    '''\.env\.taint''',
    '''\.gitleaks\.toml$''',
  ]

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_-]?key|apikey|api_secret|secret_key|access_key|auth_token)['\"]?\s*[:=]\s*['\"]([a-zA-Z0-9+/=\-_]{16,})['\"]'''
  tags = ["key", "API", "generic"]

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''(AKIA[0-9A-Z]{16})'''
  tags = ["key", "AWS"]

[[rules]]
  id = "aws-secret-key"
  description = "AWS Secret Key"
  regex = '''(?i)aws_secret_access_key\s*[:=]\s*['\"]?([a-zA-Z0-9/+=]{40})['\"]?'''
  tags = ["key", "AWS"]

[[rules]]
  id = "github-pat"
  description = "GitHub Personal Access Token"
  regex = '''ghp_[a-zA-Z0-9]{36}'''
  tags = ["key", "GitHub"]

[[rules]]
  id = "github-oauth"
  description = "GitHub OAuth Access Token"
  regex = '''gho_[a-zA-Z0-9]{36}'''
  tags = ["key", "GitHub"]

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (RSA|DSA|EC|PGP|OPENSSH) PRIVATE KEY-----'''
  tags = ["key", "Private"]

[[rules]]
  id = "password-in-url"
  description = "Password in URL"
  regex = '''[a-zA-Z]{3,10}://[^/\s:@]{3,40}:[^/\s:@]{3,80}@'''
  tags = ["password", "URL"]

[[rules]]
  id = "generic-password"
  description = "Generic Password"
  regex = '''(?i)(password|passwd|pwd)['\"]?\s*[:=]\s*['\"]([^\s'\"]{8,})['\"]'''
  tags = ["password", "generic"]

[[rules]]
  id = "laravel-app-key"
  description = "Laravel APP_KEY"
  regex = '''(?i)app_key\s*[:=]\s*['\"]?base64:[a-zA-Z0-9/+=]{32,}['\"]?'''
  tags = ["key", "Laravel"]

[[rules]]
  id = "mysql-password"
  description = "MySQL/MariaDB Password"
  regex = '''(?i)(DB_PASSWORD|MYSQL_PASSWORD)['\"]?\s*[:=]\s*['\"]([^\s'\"]{8,})['\"]'''
  tags = ["password", "MySQL"]

[[rules]]
  id = "redis-password"
  description = "Redis Password"
  regex = '''(?i)REDIS_PASSWORD['\"]?\s*[:=]\s*['\"]([^\s'\"]{8,})['\"]'''
  tags = ["password", "Redis"]
